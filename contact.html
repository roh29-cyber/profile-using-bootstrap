<!DOCTYPE html>
<html>

<head>
    <title>Contact</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="theme.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand">Rohan</a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="qualifications.html">Qualifications</a></li>
                    <li class="nav-item"><a class="nav-link" href="skills.html">Skills</a></li>
                    <li class="nav-item"><a class="nav-link" href="certifications.html">Certifications</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">

        <h3>Contact</h3>

        <form id="contactForm" class="shadow p-4">

            <label for="name" class="form-label">Name</label>
            <input type="text" id="name" class="form-control mb-3" placeholder="Enter your name" required>

            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" class="form-control mb-3" placeholder="Enter your email" required>

            <label for="mobile" class="form-label">Mobile</label>
            <input type="text" id="mobile" class="form-control mb-3" placeholder="Enter mobile number" required>

            <label for="reason" class="form-label">Reason for Contacting</label>
            <select id="reason" class="form-select mb-3" required>
                <option value="" selected disabled>Reason for Contacting</option>
                <option>Internship Opportunity</option>
                <option>Course Details / Guidance</option>
                <option>Project Collaboration</option>
                <option>General Inquiry</option>
            </select>

            <label for="message" class="form-label">Message</label>
            <textarea id="message" class="form-control mb-3" placeholder="Enter your message" required></textarea>

            <button class="btn btn-success">Submit</button>

        </form>

    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
